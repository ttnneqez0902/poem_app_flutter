name: poem_app
description: A new Flutter project for POEM self-check.
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ^5.2.0  # 🚀 檢查這行是否存在
  app_tracking_transparency: ^2.0.4  # 🚀 新增這行
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.0
  google_fonts: ^6.2.1
  image_picker: ^1.1.2

  # --- 數據庫與檔案處理 ---
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2
  path: ^1.9.0
  http: ^1.1.0

  # --- 雲端備份與授權 ---
  googleapis: ^13.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.13
  google_sign_in: ^6.2.1
  icloud_storage: ^2.2.0

  # --- 通知與提醒 ---
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^3.0.1
  shared_preferences: ^2.5.3

  # --- 臨床功能與 UI ---
  flutter_riverpod: ^2.5.1
  intl: ^0.19.0
  font_awesome_flutter: ^10.7.0
  image_cropper: ^11.0.0

  # --- 報表導出與分享 ---
  pdf: ^3.10.8
  printing: ^5.11.1
  share_plus: ^10.0.0

  # --- Firebase 核心 ---
  firebase_core: ^3.15.2
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  sign_in_with_apple: ^7.0.1
  flutter_line_sdk: ^2.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0  # 🚀 修正：補上開機畫面套件

flutter:
  uses-material-design: true

  # 🚀 修正：資產路徑建議直接列出子目錄即可
  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: NotoSansTC
      fonts:
        - asset: assets/fonts/NotoSansTC-Regular.ttf
        - asset: assets/fonts/NotoSansTC-Bold.ttf
          weight: 700

    - family: NotoSansMath
      fonts:
        - asset: assets/fonts/NotoSansMath-Regular.ttf

    - family: NotoEmoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji-Regular.ttf

# --- App Icon 配置 ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  remove_alpha_ios: true # 🚀 加上這一行，系統會自動幫您把透明背景填滿
  # Android 8.0+ 適配性圖標設定
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_logo.png"

# --- 開機畫面配置 (🚀 補上這段) ---
flutter_native_splash:
  color: "#FFFFFF" # 背景顏色
  image: "assets/images/app_logo.png" # 中央 Logo
  android_12:
    image: "assets/images/app_logo.png"
    color: "#FFFFFF"
  fullscreen: true